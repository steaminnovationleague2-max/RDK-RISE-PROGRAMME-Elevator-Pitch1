<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDK RISE PROGRAMME - Elevator Pitch Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <h1>🎤 RDK RISE PROGRAMME</h1>

    <p>Elevator Pitch Showcase</p>

</header>

<section class="topBar">

    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search Student..."
    >

    <button id="darkBtn">
        🌙 Dark Mode
    </button>

</section>

<div class="counter">

    Total Videos :
    <span id="totalVideos">45</span>

</div>

<div id="gallery" class="gallery">

    <!-- Cards will be created automatically by JavaScript -->

</div>

<div id="playerSection" class="playerSection hidden">

    <button id="closePlayer" class="closeBtn">
        ✖
    </button>

    <h2 id="studentName"></h2>

    <video
        id="videoPlayer"
        controls
        controlsList="nodownload"
    >
    </video>

    <div class="controls">

        <button id="prevBtn">
            ⏮ Previous
        </button>

        <button id="nextBtn">
            Next ⏭
        </button>

        <button onclick="document.getElementById('videoPlayer').requestFullscreen()">
            ⛶ Fullscreen
        </button>

    </div>

</div>

<footer>

    <p>
        © 2026 RDK RISE PROGRAMME | Elevator Pitch Gallery
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
